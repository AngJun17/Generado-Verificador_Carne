<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Carné — UMES</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--accent:#00d4ff;--green:#00ff88;--red:#ff3860;--text:#e2e8f0;--muted:#64748b;--border:#1e3a5f}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:24px 16px}
header{text-align:center;margin-bottom:28px}
.logo-line{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
h1{font-family:'Rajdhani',sans-serif;font-size:clamp(24px,6vw,40px);font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:1px}
.divider{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:12px auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.card-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.vector-display{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:2px}
.vector-inputs{display:none;grid-template-columns:repeat(12,1fr);gap:5px;margin-top:8px}
.vector-inputs.show{display:grid}
.vector-inputs input{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:8px 2px;text-align:center;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;width:100%}
.vector-inputs input:focus{border-color:var(--accent)}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;margin-top:8px;letter-spacing:1px}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:7px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.tab.active{background:rgba(0,212,255,.1);border-color:var(--accent);color:var(--accent)}
.tab-content{display:none}
.tab-content.active{display:block}
/* Scanner video */
.scan-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;background:#000;border:2px solid var(--border);margin-bottom:10px}
#video{width:100%;height:100%;object-fit:cover;display:block}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:60%;aspect-ratio:1;position:relative}
.scan-box::before,.scan-box::after,.c3,.c4{content:'';position:absolute;width:22px;height:22px;border-color:var(--accent);border-style:solid}
.scan-box::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:3px 0 0 0}
.scan-box::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 3px 0 0}
.c3{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 3px}
.c4{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 3px 0}
.scan-line{position:absolute;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 2s linear infinite;box-shadow:0 0 8px var(--accent)}
@keyframes scan{0%{top:20%}50%{top:80%}100%{top:20%}}
.scan-status{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
/* Botones */
.btn-primary{background:linear-gradient(135deg,#0099bb,var(--accent));border:none;border-radius:10px;padding:13px 22px;color:#000;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;margin-top:8px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,255,.3)}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;width:100%;margin-top:8px;letter-spacing:1px}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
/* Input manual */
.manual-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:16px;outline:none;width:100%;letter-spacing:4px;text-align:center;transition:border-color .2s}
.manual-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
/* Canvas foto preview */
#photoCanvas{display:none;width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:10px}
/* Resultado overlay */
.result-overlay{display:flex;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-overlay.valid{background:rgba(0,15,8,.96)}
.result-overlay.invalid{background:rgba(18,0,5,.96)}
.result-card{background:var(--surface);border-radius:18px;padding:28px 20px;max-width:400px;width:100%;text-align:center;position:relative;overflow:hidden;transform:scale(.8);transition:transform .3s}
.result-overlay.show .result-card{transform:scale(1)}
.result-card.valid{border:2px solid var(--green);box-shadow:0 0 40px rgba(0,255,136,.15)}
.result-card.invalid{border:2px solid var(--red);box-shadow:0 0 40px rgba(255,56,96,.15)}
.result-icon{font-size:52px;margin-bottom:10px}
.result-status{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;letter-spacing:3px;margin-bottom:4px}
.valid .result-status{color:var(--green)}
.invalid .result-status{color:var(--red)}
.result-sub{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin-bottom:20px}
.data-grid{background:var(--surface2);border-radius:10px;padding:14px;text-align:left;margin-bottom:16px}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-family:'Share Tech Mono',monospace;font-size:11px}
.data-row:last-child{border-bottom:none}
.data-row .key{color:var(--muted);letter-spacing:1px}
.data-row .val{color:var(--text);font-weight:bold}
.data-row .accent{color:var(--accent)}
.data-row .green{color:var(--green)}
.data-row .red{color:var(--red)}
.math-row{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);border-left:3px solid var(--accent);border-radius:6px;padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8;text-align:left;margin-bottom:14px}
.math-row .ok{color:var(--green);font-weight:bold}
.math-row .err{color:var(--red);font-weight:bold}
.math-row .hl{color:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line">Universidad Mesoamericana · Quetzaltenango</div>
    <h1>VERIFICADOR DE CARNÉ</h1>
    <div class="divider"></div>
    <div class="subtitle">Álgebra Lineal · Proyecto #2 · Ingeniería en Sistemas</div>
  </header>

  <div class="card">
    <div class="card-title">▶ Vector de Control</div>
    <div class="vector-display" id="vectorDisplay">[ 1, 5, 1, 5, 1, 5, 1, 5, 1, 5, 1, 5 ]</div>
    <button class="toggle-btn" onclick="toggleVector()">✎ Modificar</button>
    <div class="vector-inputs" id="vectorInputs"></div>
  </div>

  <div class="card">
    <div class="card-title">▶ Escanear o Ingresar Código</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('foto')">📷 Foto QR</button>
      <button class="tab" onclick="switchTab('video')">🎥 Cámara vivo</button>
      <button class="tab" onclick="switchTab('manual')">⌨ Manual</button>
    </div>

    <!-- TAB FOTO -->
    <div class="tab-content active" id="tab-foto">
      <canvas id="photoCanvas"></canvas>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📷 TOMAR FOTO DEL QR</button>
      <p style="text-align:center;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-top:10px;letter-spacing:1px">Apunta la cámara al código QR y toma la foto</p>
    </div>

    <!-- TAB VIDEO -->
    <div class="tab-content" id="tab-video">
      <div class="scan-wrap" id="scanWrap">
        <video id="video" playsinline muted autoplay></video>
        <div class="scan-overlay">
          <div class="scan-box">
            <div class="c3"></div><div class="c4"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="scan-status" id="scanStatus">LISTO</div>
      </div>
      <button class="btn-primary" id="btnStart" onclick="startVideo()">🎥 ACTIVAR CÁMARA</button>
      <button class="btn-secondary" id="btnStop" style="display:none" onclick="stopVideo()">⏹ Detener</button>
    </div>

    <!-- TAB MANUAL -->
    <div class="tab-content" id="tab-manual">
      <label>Código de 12 dígitos</label>
      <input type="text" class="manual-input" id="manualCode" placeholder="000000000000" maxlength="12" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')">
      <button class="btn-primary" onclick="verifyManual()">✔ VERIFICAR CÓDIGO</button>
    </div>
  </div>
</div>

<!-- Resultado -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card" id="resultCard">
    <div class="result-icon" id="rIcon"></div>
    <div class="result-status" id="rStatus"></div>
    <div class="result-sub" id="rSub"></div>
    <div class="data-grid" id="rGrid"></div>
    <div class="math-row" id="rMath"></div>
    <button class="btn-primary" onclick="closeResult()">↺ VERIFICAR OTRO</button>
  </div>
</div>

<script>
var vectorControl = [1,5,1,5,1,5,1,5,1,5,1,5];
var CARRERAS = {'01':'Electrónica','02':'Sistemas','03':'Telecomunicaciones'};

// Vector inputs
var vi = document.getElementById('vectorInputs');
for(var i=0;i<12;i++){
  var inp = document.createElement('input');
  inp.type='number'; inp.min=0; inp.max=9;
  inp.value=vectorControl[i]; inp.id='vc'+i;
  inp.addEventListener('input', updateVector);
  vi.appendChild(inp);
}
function toggleVector(){ document.getElementById('vectorInputs').classList.toggle('show'); }
function updateVector(){
  for(var i=0;i<12;i++) vectorControl[i]=parseInt(document.getElementById('vc'+i).value)||0;
  document.getElementById('vectorDisplay').textContent='[ '+vectorControl.join(', ')+' ]';
}

// Tabs
function switchTab(name){
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active',['foto','video','manual'][i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  if(name!=='video') stopVideo();
}

// ── TAB FOTO ──
function handlePhoto(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      var canvas = document.getElementById('photoCanvas');
      // Escalar a max 1024 para mejor procesamiento
      var maxW = 1024;
      var scale = img.width > maxW ? maxW/img.width : 1;
      canvas.width  = img.width  * scale;
      canvas.height = img.height * scale;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.style.display = 'block';

      var found = false;
      var opts = ['attemptBoth','dontInvert','onlyInvert'];
      for(var o=0; o<opts.length; o++){
        var imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
        var qr = jsQR(imgData.data, imgData.width, imgData.height, {inversionAttempts: opts[o]});
        if(qr && qr.data){ found=true; verifyCode(qr.data.trim()); break; }
      }
      if(!found) alert('No se detectó QR. Intenta con mejor luz o más cerca.');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ── TAB VIDEO ──
var stream=null, ticker=null, scanning=false;
function startVideo(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}})
  .then(function(s){
    stream=s;
    var v=document.getElementById('video');
    v.srcObject=s; v.play();
    document.getElementById('btnStart').style.display='none';
    document.getElementById('btnStop').style.display='block';
    document.getElementById('scanStatus').textContent='ESCANEANDO...';
    scanning=true;
    ticker=setInterval(scanFrame,150);
  }).catch(function(){ alert('No se pudo acceder a la cámara.'); });
}
function stopVideo(){
  scanning=false; clearInterval(ticker);
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; }
  document.getElementById('btnStart').style.display='block';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('scanStatus').textContent='LISTO';
}
function scanFrame(){
  if(!scanning) return;
  var v=document.getElementById('video');
  if(v.readyState!==v.HAVE_ENOUGH_DATA) return;
  var c=document.createElement('canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  var ctx=c.getContext('2d');
  ctx.drawImage(v,0,0);
  var opts=['attemptBoth','dontInvert','onlyInvert'];
  for(var o=0;o<opts.length;o++){
    var id=ctx.getImageData(0,0,c.width,c.height);
    var qr=jsQR(id.data,id.width,id.height,{inversionAttempts:opts[o]});
    if(qr && qr.data){ stopVideo(); verifyCode(qr.data.trim()); return; }
  }
}

// ── MANUAL ──
function verifyManual(){
  var code=document.getElementById('manualCode').value.trim();
  if(code.length!==12||!/^\d{12}$/.test(code)){ alert('Ingresa exactamente 12 dígitos.'); return; }
  verifyCode(code);
}

// ── VERIFICACIÓN ──
function verifyCode(code){
  if(!/^\d{12}$/.test(code)){ showResult(false,code,null); return; }
  var digits = code.split('').map(Number);
  var d11 = digits.slice(0,11);
  var dvInput = digits[11];

  var dot=0;
  for(var i=0;i<11;i++) dot+=vectorControl[i]*d11[i];
  dot=dot%16;

  var h=0;
  for(var i=1;i<11;i+=2) if(d11[i]>4) h++;

  var target=((-dot-h)%16+16)%16;
  var c12=vectorControl[11];
  var dvEsp=-1;
  for(var d=0;d<=9;d++){ if((c12*d)%16===target){ dvEsp=d; break; } }
  if(dvEsp===-1) dvEsp=target%10;

  var valid=(dvInput===dvEsp);
  var detail={
    code:code,
    fecha:code.slice(0,4), idCarr:code.slice(4,6),
    correl:code.slice(6,11), dvInput:dvInput,
    dot:dot, h:h, target:target, dvEsp:dvEsp, valid:valid
  };
  showResult(valid, code, detail);
}

function showResult(valid, code, detail){
  var overlay=document.getElementById('resultOverlay');
  var card=document.getElementById('resultCard');
  overlay.className='result-overlay show '+(valid?'valid':'invalid');
  card.className='result-card '+(valid?'valid':'invalid');
  document.getElementById('rIcon').textContent=valid?'✅':'❌';
  document.getElementById('rStatus').textContent=valid?'✔ VÁLIDO':'✗ INVÁLIDO';
  document.getElementById('rSub').textContent=valid
    ?'El código supera la verificación en Z₁₆'
    :'El código NO cumple c·x + h = 0 en Z₁₆';

  if(detail){
    var aa='20'+detail.fecha.slice(0,2);
    var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var mm=meses[parseInt(detail.fecha.slice(2,4))-1]||detail.fecha.slice(2,4);
    var carrNom=CARRERAS[detail.idCarr]||('Código '+detail.idCarr);
    document.getElementById('rGrid').innerHTML=
      '<div class="data-row"><span class="key">CÓDIGO</span><span class="val accent">'+detail.code+'</span></div>'+
      '<div class="data-row"><span class="key">CARRERA</span><span class="val">'+carrNom+' ('+detail.idCarr+')</span></div>'+
      '<div class="data-row"><span class="key">CORRELATIVO</span><span class="val">'+detail.correl+'</span></div>'+
      '<div class="data-row"><span class="key">FECHA</span><span class="val">'+mm+' '+aa+'</span></div>'+
      '<div class="data-row"><span class="key">DÍG. VERIFICADOR</span><span class="val">'+detail.dvInput+'</span></div>'+
      '<div class="data-row"><span class="key">ESTADO</span><span class="val '+(valid?'green':'red')+'">'+(valid?'VÁLIDO ✔':'INVÁLIDO ✗')+'</span></div>';
    document.getElementById('rMath').innerHTML=
      '<span class="hl">Vector c:</span> ['+vectorControl.join(', ')+']<br>'+
      '<span class="hl">c·x (11) mod 16:</span> '+detail.dot+'<br>'+
      '<span class="hl">h (pares &gt; 4):</span> '+detail.h+'<br>'+
      '<span class="hl">DV esperado:</span> '+detail.dvEsp+' | DV recibido: '+detail.dvInput+'<br>'+
      (valid?'<span class="ok">✔ Coinciden — VÁLIDO</span>':'<span class="err">✗ No coinciden — INVÁLIDO</span>');
  } else {
    document.getElementById('rGrid').innerHTML='<div class="data-row"><span class="key">CÓDIGO</span><span class="val red">'+code+'</span></div>';
    document.getElementById('rMath').innerHTML='<span class="err">Formato inválido</span>';
  }

  // Voz
  if('speechSynthesis' in window){
    var msg=new SpeechSynthesisUtterance(valid?'Código válido. El carné es auténtico.':'Código inválido. El carné no es válido.');
    msg.lang='es-ES'; msg.rate=0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(msg);
  }
}

function closeResult(){
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('manualCode').value='';
  document.getElementById('photoCanvas').style.display='none';
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
}
</script>
</body>
</html>
