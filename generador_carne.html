<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Carné — UMES</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--accent:#00d4ff;--green:#00ff88;--text:#e2e8f0;--muted:#64748b;--border:#1e3a5f}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,.04) 0%,transparent 50%)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:24px 16px}
header{text-align:center;margin-bottom:32px}
.logo-line{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px}
h1{font-family:'Rajdhani',sans-serif;font-size:clamp(26px,5vw,44px);font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:1px}
.divider{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:12px auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.card-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;width:100%;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
select option{background:var(--surface2)}
.vector-display{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:2px}
.vector-inputs{display:none;grid-template-columns:repeat(12,1fr);gap:5px;margin-top:8px}
.vector-inputs.show{display:grid}
.vector-inputs input{padding:8px 2px;text-align:center;font-size:12px}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:6px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;margin-top:8px;letter-spacing:1px}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:linear-gradient(135deg,#0099bb,var(--accent));border:none;border-radius:10px;padding:14px 24px;color:#000;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;margin-top:10px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,212,255,.3)}
.btn-secondary{background:none;border:1px solid var(--border);border-radius:10px;padding:10px 20px;color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;width:100%;margin-top:8px;letter-spacing:1px}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.result-section{display:none}
.result-section.show{display:block}
.code-display{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.code-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.code-number{font-family:'Share Tech Mono',monospace;font-size:clamp(18px,4vw,30px);color:var(--accent);letter-spacing:5px;word-break:break-all}
.breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
@media(max-width:480px){.breakdown{grid-template-columns:1fr 1fr}}
.breakdown-item{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:8px;padding:10px;text-align:center}
.breakdown-item .val{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--accent);letter-spacing:3px}
.breakdown-item .lbl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media(max-width:600px){.two-cols{grid-template-columns:1fr}}
.qr-wrapper{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px}
.qr-frame{padding:12px;background:#fff;border-radius:6px;display:inline-block}
.qr-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-align:center;text-transform:uppercase}
.valid-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 18px;border-radius:50px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;background:rgba(0,255,136,.1);border:1px solid var(--green);color:var(--green)}
.math-detail{background:rgba(0,212,255,.03);border:1px solid rgba(0,212,255,.1);border-left:3px solid var(--accent);border-radius:8px;padding:14px 16px;margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);line-height:1.9}
.math-detail span{color:var(--accent)}
.math-detail .ok{color:var(--green);font-weight:bold}
.btn-download{background:none;border:1px solid var(--green);color:var(--green);border-radius:8px;padding:9px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;width:100%;margin-top:10px;letter-spacing:1px}
.btn-download:hover{background:rgba(0,255,136,.08)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-line">Universidad Mesoamericana · Quetzaltenango</div>
    <h1>GENERADOR DE CARNÉ</h1>
    <div class="divider"></div>
    <div class="subtitle">Álgebra Lineal · Proyecto #2 · Ingeniería en Sistemas</div>
  </header>

  <div class="card">
    <div class="card-title">▶ Datos del Estudiante</div>
    <div class="form-grid">
      <div class="field">
        <label>Carrera</label>
        <select id="carrera">
          <option value="07">Electrónica (07)</option>
          <option value="08" selected>Sistemas (08)</option>
          <option value="14">Telecomunicaciones (14)</option>
        </select>
      </div>
      <div class="field">
        <label>Año de ingreso (4 dígitos)</label>
        <input type="text" id="anio" placeholder="2025" maxlength="4" inputmode="numeric" value="2025">
      </div>
      <div class="field">
        <label>Correlativo (últimos 5 dígitos del carné)</label>
        <input type="text" id="correlativo" placeholder="08067" maxlength="5" inputmode="numeric" value="08067">
      </div>
      <div class="field full">
        <label>Vector de Control</label>
        <div class="vector-display" id="vectorDisplay">[ 1, 5, 1, 5, 1, 5, 1, 5, 1, 5, 1, 5 ]</div>
        <button class="toggle-btn" onclick="toggleVector()">✎ Modificar vector de control</button>
        <div class="vector-inputs" id="vectorInputs"></div>
      </div>
    </div>
    <button class="btn-primary" id="btnGenerar" onclick="generarCodigo()">⬡ GENERAR CÓDIGO</button>
  </div>

  <div class="result-section" id="resultSection">
    <div class="card anim">
      <div class="card-title">▶ Código Generado</div>
      <div class="code-display">
        <div class="code-label">Código de 12 dígitos</div>
        <div class="code-number" id="codeNumber"></div>
        <div class="breakdown" id="breakdown"></div>
        <div class="math-detail" id="mathDetail"></div>
      </div>
      <div class="two-cols">
        <div class="qr-wrapper">
          <div class="qr-frame"><div id="qrcode"></div></div>
          <div class="qr-label">Escanear con verificador</div>
          <div class="valid-badge">✔ CÓDIGO VÁLIDO</div>
          <button class="btn-download" onclick="downloadQR()">⬇ Descargar QR</button>
        </div>
        <div>
          <div class="code-display">
            <div class="code-label">Resumen</div>
            <div id="resumen" style="font-family:'Share Tech Mono',monospace;font-size:12px;line-height:2;color:var(--muted)"></div>
          </div>
          <button class="btn-secondary" onclick="resetForm()">↺ Generar otro</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var vectorControl = [1,5,1,5,1,5,1,5,1,5,1,5];

// Generar inputs del vector
var vi = document.getElementById('vectorInputs');
for(var i=0;i<12;i++){
  var inp = document.createElement('input');
  inp.type='number'; inp.min=0; inp.max=9;
  inp.value=vectorControl[i]; inp.id='vc'+i;
  inp.addEventListener('input', updateVector);
  vi.appendChild(inp);
}

function toggleVector(){
  document.getElementById('vectorInputs').classList.toggle('show');
}

function updateVector(){
  for(var i=0;i<12;i++){
    vectorControl[i] = parseInt(document.getElementById('vc'+i).value)||0;
  }
  document.getElementById('vectorDisplay').textContent = '[ '+vectorControl.join(', ')+' ]';
}

function getFecha(){
  return document.getElementById('anio').value.trim();
}

function calcDV(d11){
  var dot=0;
  for(var i=0;i<11;i++) dot += vectorControl[i]*d11[i];
  dot = dot%16;
  var h=0;
  for(var i=1;i<11;i+=2) if(d11[i]>4) h++;
  var target = ((-dot-h)%16+16)%16;
  var c12 = vectorControl[11];
  var dv=-1;
  // Buscar en 0-15 (Z16 completo) — siempre existe solución exacta
  for(var d=0;d<=15;d++){
    if((c12*d)%16===target){ dv=d; break; }
  }
  var dvHex = dv.toString(16).toUpperCase(); // 10→A, 11→B ... 15→F
  return {dv:dv, dvHex:dvHex, dot:dot, h:h, target:target};
}

function generarCodigo(){
  var carrera = document.getElementById('carrera').value;
  var corrRaw = document.getElementById('correlativo').value.trim();
  if(!corrRaw){ alert('Ingresa el correlativo.'); return; }

  var anioRaw = document.getElementById('anio').value.trim();
  if(!anioRaw || !/^\d{4}$/.test(anioRaw)){ alert('El año debe ser exactamente 4 dígitos numéricos. Ej: 2025'); return; }

  updateVector();

  var fecha  = getFecha();
  var correl = corrRaw.padStart(5,'0').slice(-5);
  var code11 = (fecha+carrera+correl).split('').map(Number);
  var res    = calcDV(code11);
  var code12str = code11.join('') + res.dvHex;

  // Mostrar código
  document.getElementById('codeNumber').textContent = code12str;

  // Breakdown
  var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var carrNom = ['Electrónica','Sistemas','Telecomunicaciones'][parseInt(carrera)-1]||carrera;
  document.getElementById('breakdown').innerHTML =
    '<div class="breakdown-item"><div class="val">'+fecha+'</div><div class="lbl">Año</div></div>'+
    '<div class="breakdown-item"><div class="val">'+carrera+'</div><div class="lbl">ID Carrera</div></div>'+
    '<div class="breakdown-item"><div class="val">'+correl+'</div><div class="lbl">Correlativo</div></div>'+
    '<div class="breakdown-item"><div class="val" style="color:var(--green)">'+res.dv+'</div><div class="lbl">D. Verificador</div></div>';

  // Detalle matemático
  document.getElementById('mathDetail').innerHTML =
    '<span>Vector c:</span> ['+vectorControl.join(', ')+']<br>'+
    '<span>c·x (11 díg) mod 16:</span> '+res.dot+'<br>'+
    '<span>h (pares &gt; 4):</span> '+res.h+'<br>'+
    '<span>target:</span> '+res.target+' → dv = '+res.dvHex+' (decimal: '+res.dv+')'+
    ' <span class="ok">✔ c·x + h = 0 en Z₁₆</span>';

  // Resumen
  document.getElementById('resumen').innerHTML =
    '<span style="color:var(--accent)">CARRERA:</span>     '+carrNom+'<br>'+
    '<span style="color:var(--accent)">CORRELATIVO:</span> '+correl+'<br>'+
    '<span style="color:var(--accent)">AÑO:</span>         '+fecha+'<br>'+
    '<span style="color:var(--accent)">CÓDIGO:</span>      '+code12str+'<br>'+
    '<span style="color:var(--green)">ESTADO:</span>       VÁLIDO ✔';

  // QR
  document.getElementById('qrcode').innerHTML='';
  new QRCode(document.getElementById('qrcode'),{
    text: code12str,
    width: 240, height: 240,
    colorDark:'#000000', colorLight:'#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById('resultSection').classList.add('show');
  setTimeout(function(){ document.getElementById('resultSection').scrollIntoView({behavior:'smooth'}); }, 100);
}

function downloadQR(){
  setTimeout(function(){
    var canvas = document.querySelector('#qrcode canvas');
    if(!canvas){ alert('Genera un código primero.'); return; }
    var link = document.createElement('a');
    link.download='carne_qr.png';
    link.href=canvas.toDataURL();
    link.click();
  }, 200);
}

function resetForm(){
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('correlativo').value='';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
